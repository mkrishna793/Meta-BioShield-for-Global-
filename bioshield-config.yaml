# BioShield v2.0 — 6-Layer Defense-in-Depth Configuration

pipeline:
  run_commec: false  # Set to true if WSL/commec is available
  run_kmer: true
  run_ml: true
  run_protein_impact: true
  run_codon_bias: true
  run_cleavage_sites: true
  run_rna_folding: true

kmer_screener:
  threshold: 0.85
  db_path: "bioshield/data/threat_kmers.json"

ml_screener:
  rf_model_path: "bioshield/ml/models/rf_model.joblib"
  xgb_model_path: "bioshield/ml/models/xgb_model.joblib"
  meta_model_path: "bioshield/ml/models/meta_learner.joblib"
  threshold: 0.70

protein_impact:
  min_orf_length: 100
  identity_threshold: 40.0
  db_path: "bioshield/data/uniprot_toxins.json"

codon_bias:
  threshold: 0.75

rna_folding:
  palindrome_threshold: 0.15
